steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ehcca-gateway:$COMMIT_SHA', '.']

  # 2. Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ehcca-gateway:$COMMIT_SHA']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ehcca-gateway'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ehcca-gateway:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--service-account'
      - 'ehcca-gateway-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID,SEARCH_ENGINE_ID=clinical-search-engine-123'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/ehcca-gateway:$COMMIT_SHA'
